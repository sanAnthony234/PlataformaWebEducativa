<!DOCTYPE html>
<html lang="es">


<head>


<meta charset="UTF-8">


<meta name="viewport"
content="width=device-width, initial-scale=1.0">



<title>

Registro

</title>





<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">





<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">





<link rel="stylesheet"
href="css/login.css">



</head>





<body>





<div class="login-container">



<div class="login-card">





<div class="text-center mb-4">



<i class="bi bi-person-plus-fill logo-login"></i>



<h2>

Crear cuenta

</h2>



<p>

Registro de usuario

</p>



</div>







<div id="mensaje">

</div>







<form id="formRegistro">





<div class="mb-3">


<label class="form-label">

Nombre completo

</label>



<input

type="text"

class="form-control"

id="nombre"

autocomplete="name"

required>



</div>








<div class="mb-3">


<label class="form-label">

Correo institucional

</label>



<input

type="email"

class="form-control"

id="correo"

placeholder="usuario@espe.edu.ec"

autocomplete="email"

required>



</div>








<div class="mb-3">


<label class="form-label">

Contraseña

</label>



<input

type="password"

class="form-control"

id="password"

minlength="4"

autocomplete="new-password"

required>



</div>








<div class="mb-3">


<label class="form-label">

Rol

</label>




<select

class="form-select"

id="rol"

required>





<option value="">

Seleccione un rol

</option>





<option value="estudiante">

Estudiante

</option>





<option value="docente">

Docente

</option>





</select>



</div>








<button

class="btn btn-success w-100"

type="submit">


Registrarse


</button>







</form>







<div class="text-center mt-3">



<a href="login.html">


Ya tengo una cuenta


</a>



</div>






</div>



</div>








<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>




<script src="js/storage.js"></script>



<script src="js/registro.js"></script>




</body>


</html>
