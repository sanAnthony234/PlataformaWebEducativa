<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Cursos | EduPlatform</title>



<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">


<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


<link rel="stylesheet"
href="../css/dashboard.css">


</head>


<body>


<div class="course-page">



<a href="../dashboard.html"
class="back-btn">

<i class="bi bi-arrow-left"></i>

Dashboard

</a>





<div class="d-flex justify-content-between align-items-center mb-4">


<div>

<h1>

📚 Cursos

</h1>


<p>

Gestiona y consulta los cursos disponibles.

</p>


</div>




<button
id="btnCrearCurso"
class="btn btn-primary">


<i class="bi bi-plus-circle"></i>

Crear curso


</button>



</div>






<div id="listaCursos"
class="course-grid">

</div>




</div>








<!-- MODAL CREAR CURSO -->


<div class="modal fade" id="modalCurso">


<div class="modal-dialog">


<div class="modal-content">



<div class="modal-header">


<h5 class="modal-title">

Crear nuevo curso

</h5>



<button
class="btn-close"
data-bs-dismiss="modal">

</button>


</div>






<div class="modal-body">



<label class="form-label">

Nombre del curso

</label>


<input
type="text"
id="nombreCursoNuevo"
class="form-control mb-3"
placeholder="Ejemplo: Programación Web">






<label class="form-label">

Descripción

</label>


<textarea
id="descripcionCursoNuevo"
class="form-control mb-3"
placeholder="Descripción del curso">

</textarea>






<label class="form-label">

Docente responsable

</label>


<input
type="text"
id="docenteCursoNuevo"
class="form-control"
placeholder="Ejemplo: Ing. Carlos Pérez">





</div>







<div class="modal-footer">


<button
class="btn btn-secondary"
data-bs-dismiss="modal">

Cancelar

</button>



<button
id="guardarCurso"
class="btn btn-primary">

Guardar curso

</button>



</div>




</div>


</div>


</div>






<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>



<script src="../js/storage.js"></script>

<script src="../js/cursos.js"></script>



</body>

</html>
