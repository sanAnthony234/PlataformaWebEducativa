<!DOCTYPE html>
<html lang="es">

<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>

Crear Curso

</title>





<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">



<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">



<link rel="stylesheet"
href="../css/dashboard.css">



</head>




<body class="bg-light">






<div class="container py-5">





<a href="cursos.html" class="btn btn-outline-primary mb-4">


<i class="bi bi-arrow-left"></i>


Volver a Cursos


</a>







<div class="card shadow">



<div class="card-body">





<h2>

<i class="bi bi-book"></i>

Crear nuevo curso

</h2>





<p class="text-muted">

Registro de curso académico

</p>







<div id="mensaje">


</div>








<form id="formCurso">





<div class="mb-3">


<label class="form-label">

Nombre del curso

</label>



<input

type="text"

class="form-control"

id="nombreCurso"

required>



</div>








<div class="mb-3">


<label class="form-label">

Descripción

</label>




<textarea

class="form-control"

id="descripcionCurso"

rows="4"

required>

</textarea>




</div>







<button

type="submit"

class="btn btn-success">


<i class="bi bi-save"></i>


Guardar curso


</button>







</form>





</div>



</div>







</div>







<script src="../js/storage.js"></script>


<script src="../js/crearCurso.js"></script>




</body>


</html>
